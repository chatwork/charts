# Default values for example.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride:  # Override name of app

fullnameOverride:  # Override the full qualified app name

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: "25%"
    maxUnavailable: 1

annotations: {} # annotations for  deployment

labels: {} # labels for  deployment
#  name: value

# If you want fix replicaCount, disable autoscaling.enabled and uncomment the following line
#replicas: 1 # replicas for deployment

revisionHistoryLimit: "" # revisionHistoryLimit

podAnnotations: {} # pod annotations

podLabels: {} # pod labels

podSecurityContext: {} # pod securityContext

affinity: {} # affinity

# -- Node affinity for targeting specific node groups.
# Set key and value to generate a
# requiredDuringSchedulingIgnoredDuringExecution node affinity rule.
# Concrete defaults (e.g. ARM nodes) are set in Helmfile settings.
#nodeAffinity:
#  key: ""
#  value: ""

nodeSelector: {} # nodeSelector

imagePullSecrets: [] # imagePullSecrets

readinessGates: [] # readinessGates

priorityClassName: "" # priorityClassName

progressDeadlineSeconds: "" # progressDeadlineSeconds

volumes: [] # pod volumes(initContainers, containers)

# -- Main container image
image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

containerPort: 8080 # port exposed by the main container

# -- Graceful shutdown configuration (required).
# The template uses this to set terminationGracePeriodSeconds and
# generate a preStop lifecycle hook (sleep for deregistration delay).
#gracefulShutdown:
#  seconds: 30

command: [] # container command override
args: [] # container args override
env: [] # environment variables
envFrom: [] # environment variable sources
resources: {} # container resources (limits/requests)
securityContext: {} # container security context
volumeMounts: [] # container volume mounts

# -- Health check probes.
# startupProbe and livenessProbe are required in the template (rendering fails if not set).
# readinessProbe is optional.
#startupProbe:
#  httpGet:
#    path: /healthz
#    port: 8080
#  failureThreshold: 5
#  initialDelaySeconds: 10
#  periodSeconds: 1
#livenessProbe:
#  httpGet:
#    path: /healthz
#    port: 8080
#  failureThreshold: 2
#  periodSeconds: 10
#readinessProbe:
#  httpGet:
#    path: /ready
#    port: 8080
#  periodSeconds: 5
#  failureThreshold: 3

extraContainers: [] # additional sidecar containers (escape hatch)

initContainers:
  enabled: false # if true, you can use initContainers

  containers: [] # initContainers config
  #  - name: init
  #
  #    image:
  #      repository: chatwork/init
  #      tag: latest
  #
  #    command: []
  #    args: []
  #
  #    env: []
  #    # - name: DEMO_GREETING
  #    #   value: "Hello from the environment"
  #
  #    envFrom: []
  #    # - configMapRef:
  #    #     name: special-config
  #    volumeMounts: []
  #    # - name: volume-name
  #    #   mountPath: /path/to

configmaps: {} # transform ConfigMap manifest. You can set `binaryData`, `data`
#  your-configmap-name:
#    labels:
#      a: b
#    annotations:
#      foo: bar
#    data:
#      slime: '₍Ꙭ̂₎'

secrets: {} # transform Secret's manifest. You can set `data`, `stringData` and `type`
#  your-secret-name:
#    annotations:
#      foo: bar
#  data:
#    slime: 4oKN6pmszILigo4K

autoscaling:
  enabled: false # if true, you can use hpa
  behavior: {} # autscaling behavior https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/#configurable-scaling-behavior
  metrics: [] # autoscaling metrics
  maxReplicas: 2 # autoscaling maxReplicas
  minReplicas: 1 # autoscaling minReplicas

service:
  enabled: false # if true, you can use service
  type: ClusterIP # service type(ClusterIP, NodePort, LoadBalancer)
  ports: {} # service ports
  #  http:
  #    # container port
  #    targetPort: 8080
  #    # svc port
  #    port: 80
  #    protocol: TCP

clusterRole:
  enabled: false # if true, you can use clusterRole
  rules: [] # clusterRole rules
  #  - apiGroups:
  #    - ""
  #    resources:
  #    - nodes
  #    verbs:
  #    - get
  #    - list
  #    - watch

role:
  enabled: false # if true, you can use role
  rules: [] # role rules
  #  - apiGroups:
  #    - ""
  #    resources:
  #    - pods
  #    verbs:
  #    - watch

serviceAccount:
  create: false # if true, you can create serviceAccount
  name: # if you create serviceAccount, you can set name
  labels: {} # service account labels
  annotations: {} # serviceAccount annotations

podDisruptionBudget:
  enabled: true # PDB enabled by default to protect availability
  annotations: {} # podDisruptionBudget annotations
  labels: {} # podDisruptionBudget labels
  maxUnavailable: 1 # allow at most 1 pod unavailable during disruptions
  minAvailable: # podDisruptionBudget minAvailable

ingress:
  # -- Private ingress (internal ALB)
  private:
    enabled: false
    annotations: {}
    labels: {}
    hosts: []
    #  - host: api.internal.example.com
    #    paths:
    #      - path: "/*"
    #        pathType: ImplementationSpecific
    #        portNumber: 80
    tls: []

  # -- Public ingress (internet-facing ALB)
  public:
    enabled: false
    annotations: {}
    labels: {}
    hosts: []
    #  - host: api.example.com
    #    paths:
    #      - path: "/*"
    #        pathType: ImplementationSpecific
    #        portNumber: 80
    tls: []

test:
  enabled: false # if true, you can use helm test
  containers: [] # helm test container config
  #- name: app1-test
  #
  #  image:
  #    repository: curl
  #    tag: latest
  #    pullPolicy: Always
  #  # you can use environment vairables $RELEASE_NAME, $NAMESPACE, $APP_FULLNAME
  #  command: ["curl","$RELEASE_NAME.$NAMESPACE"]
  #
  #  env: []
  #
  #  envFrom: []

