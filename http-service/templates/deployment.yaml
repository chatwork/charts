{{- $root := . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "http-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if .Values.reloader.enabled }}
    reloader.stakater.com/auto: "true"
    {{- end }}
    {{- with .Values.deployment.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "http-service.labels" . | nindent 4 }}
    {{- if .Values.datadog.enabled }}
    tags.datadoghq.com/env: {{ required "datadog.env is required when datadog.enabled is true" .Values.datadog.env }}
    tags.datadoghq.com/service: {{ required "datadog.service is required when datadog.enabled is true" .Values.datadog.service }}
    tags.datadoghq.com/version: {{ required "datadog.version is required when datadog.enabled is true" .Values.datadog.version | quote }}
    {{- end }}
    {{- with .Values.deployment.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if and (not .Values.autoscaling.enabled) .Values.replicas }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "http-service.selectorLabels" . | nindent 6 }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  {{- with .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  template:
    metadata:
      annotations:
        checksum/configmap: '{{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}'
        checksum/secret: '{{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}'
      {{- with .Values.pod.annotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "http-service.selectorLabels" . | nindent 8 }}
        {{- if .Values.datadog.enabled }}
        tags.datadoghq.com/env: {{ required "datadog.env is required when datadog.enabled is true" .Values.datadog.env }}
        tags.datadoghq.com/service: {{ required "datadog.service is required when datadog.enabled is true" .Values.datadog.service }}
        tags.datadoghq.com/version: {{ required "datadog.version is required when datadog.enabled is true" .Values.datadog.version | quote }}
        {{- end }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.useHostNetwork }}
      hostNetwork: {{ .Values.useHostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- if and (not .Values.useHostNetwork) .Values.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- end }}
      {{- with .Values.shareProcessNamespace }}
      shareProcessNamespace: {{ . }}
      {{- end }}
      {{- with .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- tpl (. | toYaml) $root | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- tpl (. | toYaml) $root | nindent 8 }}
      {{- end }}
      {{- with .Values.readinessGates }}
      readinessGates:
        {{- tpl (. | toYaml) $root | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "http-service.serviceAccountName" . }}
      {{- with .Values.pod.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- tpl (. | toYaml) $root | nindent 8 }}
      {{- end }}
      {{- with .Values.restartPolicy }}
      restartPolicy: {{ . }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- $drainSeconds := required "gracefulShutdown.trafficDrainSeconds is required" .Values.gracefulShutdown.trafficDrainSeconds }}
      {{- $appSeconds := required "gracefulShutdown.appShutdownTimeoutSeconds is required" .Values.gracefulShutdown.appShutdownTimeoutSeconds }}
      terminationGracePeriodSeconds: {{ add $drainSeconds $appSeconds }}
      {{- with .Values.progressDeadlineSeconds }}
      progressDeadlineSeconds: {{ . }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range .Values.topologySpreadConstraints }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "http-service.selectorLabels" $root | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- tpl (. | toYaml) $root | nindent 8 }}
      {{- end }}
      {{- if .Values.initContainers.enabled }}
      initContainers:
        {{- range $container := .Values.initContainers.containers }}
        - name: {{ include "http-service.fullname" $root }}-{{ $container.name }}
          image: {{ $container.image.repository }}:{{ $container.image.tag }}
          {{- with $container.image.pullPolicy }}
          imagePullPolicy: {{ . }}
          {{- end }}
          {{- with $container.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $container.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $container.workingDir }}
          workingDir: {{ . }}
          {{- end }}
          {{- with $container.env }}
          env:
            {{- tpl (. | toYaml) $root | nindent 12 }}
          {{- end }}
          {{- with $container.envFrom }}
          envFrom:
            {{- tpl (. | toYaml) $root | nindent 12 }}
          {{- end }}
          {{- with $container.volumeMounts }}
          volumeMounts:
            {{- tpl (. | toYaml) $root | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "http-service.fullname" . }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - sleep
                  - {{ $drainSeconds | quote }}
          startupProbe:
            {{- toYaml (required "startupProbe is required" .Values.startupProbe) | nindent 12 }}
          livenessProbe:
            {{- toYaml (required "livenessProbe is required" .Values.livenessProbe) | nindent 12 }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
