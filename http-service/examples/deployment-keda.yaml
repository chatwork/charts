# Deployment with KEDA autoscaling
image:
  repository: nginx
  tag: latest

containerPort: 80

gracefulShutdown:
  trafficDrainSeconds: 25
  appShutdownTimeoutSeconds: 30

startupProbe:
  httpGet:
    path: /
    port: 80
  failureThreshold: 5
  initialDelaySeconds: 10
  periodSeconds: 1

livenessProbe:
  httpGet:
    path: /
    port: 80
  failureThreshold: 2
  periodSeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 100m
    memory: 128Mi

datadog:
  enabled: true
  env: production
  service: nginx-example-keda
  version: "1.0.0"

autoscaling:
  type: keda
  minReplicas: 2
  maxReplicas: 10
  keda:
    pollingInterval: 30
    cooldownPeriod: 300
    triggers:
      - type: cpu
        metadata:
          type: Utilization
          value: "50"

service:
  enabled: true
  type: ClusterIP
  ports:
    http:
      targetPort: 80
      port: 80
      protocol: TCP
